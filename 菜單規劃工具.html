<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>節日菜單規劃</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Georgia','標楷體','DFKai-SB',serif;
  background: #fff;
  color: #1a1a1a;
  min-height: 100vh;
  color-scheme: light only;
}

/* ══ TOP NAV ══ */
.top-nav {
  background: #2a1f0a;
  display: flex;
  align-items: stretch;
  border-bottom: 3px solid #c9a84c;
  position: sticky; top: 0; z-index: 200;
  box-shadow: 0 2px 12px rgba(0,0,0,0.18);
}
.nav-brand {
  padding: 14px 28px;
  color: #f5e998;
  font-size: 1.1rem;
  letter-spacing: 0.14em;
  font-weight: normal;
  border-right: 1px solid #4a3520;
  white-space: nowrap;
}
.nav-brand small {
  display: block;
  font-size: 0.6rem;
  color: #c9a84c;
  letter-spacing: 0.3em;
  margin-bottom: 2px;
}
.nav-tabs {
  display: flex;
  align-items: stretch;
  flex: 1;
}
.nav-tab {
  padding: 0 24px;
  color: #c9a84c;
  font-size: 0.85rem;
  letter-spacing: 0.1em;
  cursor: pointer;
  border: none;
  background: none;
  font-family: inherit;
  border-bottom: 3px solid transparent;
  margin-bottom: -3px;
  transition: all 0.15s;
  display: flex; align-items: center;
}
.nav-tab:hover { color: #f5e998; background: rgba(255,255,255,0.05); }
.nav-tab.active { color: #f5e998; border-bottom-color: #f5e998; background: rgba(255,255,255,0.07); }
.nav-right {
  display: flex; align-items: center; gap: 10px;
  padding: 0 20px;
  margin-left: auto;
}
.persons-box {
  background: rgba(232,198,102,0.12);
  border: 1px solid #6f6539;
  border-radius: 4px;
  padding: 5px 12px;
  display: flex; align-items: center; gap: 8px;
  color: #c9a84c;
  font-size: 0.8rem;
  letter-spacing: 0.06em;
}
.persons-box input {
  width: 44px;
  background: rgba(0,0,0,0.3);
  border: 1px solid #6f6539;
  border-radius: 3px;
  color: #f5e998;
  font-size: 1rem;
  text-align: center;
  padding: 2px 4px;
  font-family: inherit;
}
.btn-nav {
  border-radius: 4px; padding: 6px 13px; cursor: pointer;
  font-size: 0.78rem; letter-spacing: 0.06em; font-family: inherit;
  border: 1px solid #6f6539; background: none; color: #c9a84c;
  transition: all 0.15s; white-space: nowrap;
}
.btn-nav:hover { background: rgba(201,168,76,0.15); color: #f5e998; }

/* ══ PAGES ══ */
.page { display: none; }
.page.active { display: block; }

/* ══════════════════════════════════
   PAGE 1: 菜單規劃
══════════════════════════════════ */
.menu-layout {
  display: grid;
  grid-template-columns: 230px 1fr;
  min-height: calc(100vh - 67px);
}

/* Sidebar */
.menu-sidebar {
  background: #faf8f3;
  border-right: 1px solid #e8e0c8;
  display: flex; flex-direction: column;
  position: sticky; top: 67px;
  height: calc(100vh - 67px);
  overflow: hidden;
}
.sidebar-scroll { flex: 1; overflow-y: auto; padding: 16px 0 0; }
.sidebar-label {
  font-size: 0.62rem; letter-spacing: 0.3em; color: #b09060;
  padding: 0 18px 10px; text-transform: uppercase;
}
.yr-group { margin-bottom: 2px; }
.yr-label {
  font-size: 0.65rem; color: #c9a84c; letter-spacing: 0.2em;
  padding: 8px 18px 3px; font-weight: bold;
}
.nav-btn {
  display: block; width: 100%; text-align: left;
  padding: 8px 18px 8px 26px;
  border: none; background: none; cursor: pointer;
  font-family: inherit; font-size: 0.88rem; color: #5a4a2a;
  letter-spacing: 0.03em; transition: all 0.12s;
  border-left: 3px solid transparent;
}
.nav-btn:hover { background: rgba(201,168,76,0.12); color: #2a1f0a; }
.nav-btn.active { background: rgba(201,113,15,0.1); color: #c9710f; border-left-color: #c9710f; font-weight: bold; }
.nav-btn .d-small { display: block; font-size: 0.65rem; color: #b09060; margin-top: 1px; }
.sidebar-footer {
  padding: 14px 16px;
  border-top: 1px solid #e8e0c8;
  background: #faf8f3;
}
.add-session-btn {
  width: 100%; background: none; border: 1px dashed #c9a84c;
  border-radius: 4px; padding: 7px 0; cursor: pointer;
  font-size: 0.78rem; color: #8b7040; letter-spacing: 0.1em;
  font-family: inherit; transition: all 0.15s;
}
.add-session-btn:hover { background: rgba(201,168,76,0.1); color: #c9710f; }
.new-session-form { display: none; margin-top: 10px; }
.new-session-form.show { display: block; }
.ns-row { margin-bottom: 7px; }
.ns-row label { display: block; font-size: 0.65rem; color: #b09060; letter-spacing: 0.15em; margin-bottom: 3px; }
.ns-row input, .ns-row select {
  width: 100%; border: 1px solid #ddd0b0; border-radius: 3px;
  padding: 5px 8px; font-size: 0.82rem; background: #fff;
  color: #1a1a1a; font-family: inherit;
}
.ns-row input:focus, .ns-row select:focus { outline: none; border-color: #c9710f; }
.ns-actions { display: flex; gap: 6px; margin-top: 8px; }
.ns-btn-add {
  flex: 1; background: #6f6539; color: #f5e998; border: none;
  border-radius: 3px; padding: 6px 0; cursor: pointer;
  font-size: 0.78rem; letter-spacing: 0.08em; font-family: inherit;
}
.ns-btn-add:hover { background: #c9710f; }
.ns-btn-cancel {
  background: none; border: 1px solid #ddd0b0; border-radius: 3px;
  padding: 6px 10px; cursor: pointer; font-size: 0.78rem;
  color: #b09060; font-family: inherit;
}
.ns-err { color: #8b2020; font-size: 0.7rem; margin-top: 5px; display: none; }

/* Main area */
.menu-main { padding: 28px 36px 60px; max-width: 860px; }
.menu-empty { color: #bbb; font-size: 0.9rem; text-align: center; padding: 80px 20px; letter-spacing: 0.05em; }

.menu-hdr { margin-bottom: 24px; padding-bottom: 14px; border-bottom: 2px solid #e8d8a0; }
.menu-hdr-title { font-size: 1.5rem; color: #2a1f0a; letter-spacing: 0.12em; }
.menu-hdr-meta { font-size: 0.78rem; color: #b09060; letter-spacing: 0.18em; margin-top: 4px; }
.menu-hdr-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }

.sec-label {
  font-size: 0.65rem; letter-spacing: 0.32em; color: #b09060;
  margin: 22px 0 10px; display: flex; align-items: center; gap: 10px;
  text-transform: uppercase;
}
.sec-label::after { content:''; flex:1; height:1px; background:#f0e8d0; }

/* Dish rows */
.dish-row {
  display: grid; grid-template-columns: 26px 1fr;
  padding: 9px 0; border-bottom: 1px solid #f0ead8;
  gap: 0;
}
.dish-row:last-child { border-bottom: none; }
.dish-num { font-size: 0.7rem; color: #ccc; padding-top: 3px; }
.dish-body { padding: 0 10px; }
.dish-name { font-size: 0.98rem; color: #1a1a1a; letter-spacing: 0.03em; }
.dish-tags { display: flex; flex-wrap: wrap; gap: 4px 6px; margin-top: 5px; }

.ing-tag {
  font-size: 0.75rem; background: #f5f0e5; border: 1px solid #e0d0a0;
  border-radius: 2px; padding: 2px 7px; color: #6f6539;
  cursor: pointer; transition: all 0.12s; letter-spacing: 0.02em;
}
.ing-tag:hover { background: rgba(201,113,15,0.12); border-color: #c9710f; color: #8b4010; }
.ing-tag.linked { background: #e8f4ff; border-color: #90c0e8; color: #1a4a8b; }
.ing-tag.linked:hover { background: rgba(26,74,139,0.12); }
.note-badge {
  font-size: 0.65rem; color: #8b2020; background: rgba(139,32,32,0.07);
  border: 1px solid rgba(139,32,32,0.18); border-radius: 2px; padding: 1px 5px;
}

/* Qty panel */
.qty-panel {
  background: #fffdf5; border: 1px solid #e8d8a0; border-radius: 4px;
  padding: 10px 12px; margin-top: 8px; display: none;
}
.qty-panel.open { display: block; }
.qty-panel-hdr {
  font-size: 0.65rem; color: #b09060; letter-spacing: 0.2em; margin-bottom: 8px;
}
.qty-row-item {
  display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
}
.qty-row-item label { flex: 1; font-size: 0.82rem; color: #5a4a2a; }
.qty-input {
  width: 58px; border: 1px solid #ddd0b0; border-radius: 3px;
  padding: 3px 6px; font-size: 0.82rem; text-align: right;
  background: #fff; color: #1a1a1a; font-family: inherit;
}
.qty-input:focus { outline: none; border-color: #c9710f; }
.qty-unit-lbl { font-size: 0.75rem; color: #b09060; min-width: 36px; }
.qty-result { font-size: 0.78rem; color: #c9710f; font-weight: bold; min-width: 80px; text-align: right; }
.qty-type-badge {
  font-size: 0.65rem; padding: 1px 6px; border-radius: 2px; margin-left: 4px;
}
.qt-整份    { background: #fff0e0; color: #8b4010; border: 1px solid #f0c090; }
.qt-個人份  { background: #e8f4ff; color: #1a4a8b; border: 1px solid #90c0e8; }
.qt-固定配料 { background: #f0f8e8; color: #3a6020; border: 1px solid #a8d080; }

.add-dish-btn {
  background: none; border: 1px dashed #ddd0b0; border-radius: 4px;
  padding: 7px 14px; cursor: pointer; font-size: 0.8rem; color: #b09060;
  letter-spacing: 0.08em; font-family: inherit; width: 100%; margin-top: 8px;
  transition: all 0.15s;
}
.add-dish-btn:hover { border-color: #c9710f; color: #c9710f; }

.new-dish-form {
  background: rgba(201,168,76,0.07); border: 1px dashed #c9a84c;
  border-radius: 5px; padding: 12px; margin-top: 10px; display: none;
}
.new-dish-form.show { display: block; }
.nd-row { margin-bottom: 8px; }
.nd-row label { display: block; font-size: 0.65rem; color: #b09060; letter-spacing: 0.15em; margin-bottom: 3px; }
.nd-row input {
  width: 100%; border: 1px solid #ddd0b0; border-radius: 3px;
  padding: 5px 8px; font-size: 0.88rem; background: #fff;
  color: #1a1a1a; font-family: inherit;
}
.nd-row input:focus { outline: none; border-color: #c9710f; }
.nd-actions { display: flex; gap: 8px; margin-top: 8px; }
.btn-add-dish {
  background: #c9710f; color: #fff; border: none; border-radius: 3px;
  padding: 6px 14px; cursor: pointer; font-size: 0.8rem; font-family: inherit;
}
.btn-cancel-dish {
  background: none; border: 1px solid #ddd0b0; border-radius: 3px;
  padding: 6px 12px; cursor: pointer; font-size: 0.8rem; color: #b09060; font-family: inherit;
}

/* 地基主 */
.dizhu-box { margin-top: 28px; border: 1px solid #c9a84c; border-radius: 5px; overflow: hidden; }
.dizhu-hdr {
  background: linear-gradient(90deg, #3d1e02, #6f6539);
  color: #f5e998; padding: 7px 14px; font-size: 0.8rem; letter-spacing: 0.2em;
}
.dizhu-body { padding: 10px 14px; }
.dizhu-item {
  display: flex; gap: 8px; padding: 4px 0;
  border-bottom: 1px dotted #e8d8a0; font-size: 0.86rem; color: #5a4a2a;
}
.dizhu-item:last-child { border-bottom: none; }
.dizhu-n { color: #c9a84c; font-size: 0.7rem; min-width: 18px; }

/* Shopping panel */
.shopping-panel {
  position: fixed; right: 0; top: 67px;
  width: 270px; height: calc(100vh - 67px);
  background: #fffdf5; border-left: 1px solid #e8d8a0;
  transform: translateX(100%); transition: transform 0.28s ease;
  overflow-y: auto; z-index: 150; padding: 18px;
  display: flex; flex-direction: column; gap: 4px;
}
.shopping-panel.open { transform: translateX(0); }
.sp-title {
  font-size: 0.8rem; letter-spacing: 0.18em; color: #2a1f0a;
  margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
}
.sp-close { background: none; border: none; cursor: pointer; color: #b09060; font-size: 1rem; padding: 2px 5px; }
.sp-close:hover { color: #2a1f0a; }
.sp-group-label { font-size: 0.62rem; color: #c9a84c; letter-spacing: 0.2em; margin: 10px 0 4px; }
.sp-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 4px 0; border-bottom: 1px dotted #e8d8a0; font-size: 0.83rem;
}
.sp-name { color: #2a1f0a; }
.sp-qty { font-size: 0.76rem; color: #c9710f; font-weight: bold; }
.sp-empty { color: #ccc; font-size: 0.82rem; padding: 20px 0; text-align: center; }

/* Print overlay */
.print-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(40,28,8,0.6); z-index: 300;
  align-items: center; justify-content: center;
}
.print-overlay.open { display: flex; }
.print-card {
  background: #fffef8; border: 1px solid #c9a84c;
  width: 460px; min-height: 520px; padding: 50px 46px 46px;
  position: relative; box-shadow: 0 12px 60px rgba(40,28,8,0.4);
  display: flex; flex-direction: column;
}
.print-card::before { content:''; position:absolute; inset:8px; border:1px solid rgba(201,168,76,0.35); pointer-events:none; }
.pc-close { position:absolute; top:13px; right:14px; background:none; border:none; cursor:pointer; color:#b09060; font-size:0.95rem; padding:4px 7px; font-family:inherit; }
.pc-do { position:absolute; top:13px; right:72px; background:none; border:1px solid #c9a84c; border-radius:3px; cursor:pointer; color:#6f6539; font-size:0.76rem; letter-spacing:0.1em; padding:4px 11px; font-family:inherit; }
.pc-do:hover { background:#6f6539; color:#fff; }
.pc-eyebrow { font-size:0.6rem; letter-spacing:0.42em; color:#b09060; text-align:center; margin-bottom:20px; text-transform:uppercase; }
.pc-divider { width:100%; height:1px; background:linear-gradient(90deg,transparent,#c9a84c 30%,#c9a84c 70%,transparent); margin-bottom:26px; }
.pc-title { font-size:1.9rem; color:#2a1f0a; text-align:center; letter-spacing:0.14em; font-weight:normal; line-height:1.2; margin-bottom:6px; }
.pc-date { font-size:0.78rem; color:#b09060; text-align:center; letter-spacing:0.2em; margin-bottom:28px; }
.pc-mid { width:56px; height:1px; background:#c9a84c; margin:0 auto 26px; }
.pc-dishes { flex:1; list-style:none; }
.pc-dish { display:flex; align-items:baseline; gap:10px; padding:6px 0; border-bottom:1px dotted #e0d0b0; font-size:0.98rem; color:#1a1a1a; }
.pc-dish:last-child { border-bottom:none; }
.pc-dnum { font-size:0.65rem; color:#b09060; min-width:18px; }
.pc-footer { margin-top:26px; text-align:center; font-size:0.58rem; color:#c9a84c; letter-spacing:0.3em; text-transform:uppercase; }

@media print {
  .top-nav, .menu-sidebar, .shopping-panel, .print-overlay .pc-close, .print-overlay .pc-do { display:none!important; }
  .menu-layout { display:none; }
  .print-overlay { display:block!important; position:static; background:none; }
  .print-card { width:100%; box-shadow:none; border:none; outline:none; padding:20mm 24mm; }
  .print-card::before { display:none; }
}

/* ══════════════════════════════════
   PAGE 2: 食材資料庫
══════════════════════════════════ */
.db-toolbar {
  padding: 11px 36px; background: #f8f8f8; border-bottom: 1px solid #e8e8e8;
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  position: sticky; top: 67px; z-index: 100;
}
.db-search {
  flex:1; min-width:150px; max-width:230px;
  border:1px solid #d8d8d8; border-radius:4px; padding:6px 11px;
  font-size:0.86rem; background:#fff; color:#1a1a1a; font-family:inherit;
}
.db-search:focus { outline:none; border-color:#c9710f; }
.db-sel {
  border:1px solid #d8d8d8; border-radius:4px; padding:6px 9px;
  font-size:0.8rem; background:#fff; color:#1a1a1a; font-family:inherit; cursor:pointer;
}
.db-sel:focus { outline:none; border-color:#c9710f; }
.db-count { font-size:0.76rem; color:#aaa; margin-left:auto; }
.btn-db-add {
  background:none; border:1px solid #d8d8d8; border-radius:4px;
  padding:6px 13px; cursor:pointer; font-size:0.78rem; color:#666;
  font-family:inherit; transition:all 0.13s;
}
.btn-db-add:hover { border-color:#c9710f; color:#c9710f; }

.db-legend {
  padding:8px 36px; background:#fff; border-bottom:1px solid #f0f0f0;
  display:flex; gap:18px; flex-wrap:wrap; align-items:center;
}
.leg-title { font-size:0.62rem; color:#aaa; letter-spacing:0.2em; }
.leg-item { display:flex; align-items:center; gap:5px; font-size:0.72rem; color:#555; }

.db-table-wrap { padding:0 36px 60px; overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:0.86rem; }
thead th {
  text-align:left; padding:9px 11px; font-size:0.65rem; letter-spacing:0.2em;
  color:#999; border-bottom:2px solid #ebebeb; white-space:nowrap;
  cursor:pointer; user-select:none; font-weight:normal;
  background:#fff; position:sticky; top:116px;
}
thead th:hover { color:#c9710f; }
.sort-arr { font-size:0.58rem; margin-left:3px; }
tbody tr { border-bottom:1px solid #f5f5f5; transition:background 0.08s; }
tbody tr:hover { background:#fdf8f2; }
tbody tr.prow { color:#bbb; }
tbody td { padding:8px 11px; vertical-align:middle; color:#1a1a1a; }
td.cn { color:#ccc; font-size:0.7rem; width:36px; }
td.cname { font-size:0.93rem; min-width:88px; }
td.cdish { min-width:100px; }
td.ccat  { min-width:86px; }
td.cunit { min-width:76px; }
td.cconv { min-width:150px; color:#555; font-size:0.8rem; }
td.cnote { min-width:110px; font-size:0.76rem; color:#999; font-style:italic; }

.cat-badge {
  display:inline-block; font-size:0.7rem; padding:2px 8px; border-radius:20px;
  cursor:pointer; border:1px solid transparent; transition:opacity 0.12s; white-space:nowrap;
}
.cat-badge:hover { opacity:0.75; }
.cat-蔬菜   { background:#e8f5e2; border-color:#b5dba6; color:#2e6b1a; }
.cat-禽畜   { background:#fef0e0; border-color:#f0c89a; color:#7a3b10; }
.cat-海鮮   { background:#e0f0fa; border-color:#9acce0; color:#1a5070; }
.cat-豆蛋   { background:#fdf8e0; border-color:#e0d080; color:#6b5a10; }
.cat-辛香料  { background:#f8e8f8; border-color:#d8a0d8; color:#6b1a6b; }
.cat-醬料   { background:#f0e8e0; border-color:#c8a888; color:#5a3820; }
.cat-現成品  { background:#e8e8f8; border-color:#a0a0d8; color:#2a2a6b; }
.cat-穀糧   { background:#f5f0e5; border-color:#d0c080; color:#5a4a20; }
.cat-乳製品  { background:#f0f8f0; border-color:#90c8a0; color:#206040; }
.cat-乾貨   { background:#fff8ec; border-color:#e8c880; color:#8b5e00; }
.cat-湯底   { background:#ecf4ff; border-color:#90b8e8; color:#1a3a6b; }
.cat-未分類  { background:#f2f2f2; border-color:#d8d8d8; color:#888; }

.dish-badge {
  display:inline-block; font-size:0.7rem; padding:2px 7px; border-radius:3px;
  cursor:pointer; white-space:nowrap; transition:opacity 0.12s;
}
.dish-badge:hover { opacity:0.75; }
.dish-整份    { background:#fff0e0; color:#8b4010; border:1px solid #f0c090; }
.dish-個人份  { background:#e8f4ff; color:#1a4a8b; border:1px solid #90c0e8; }
.dish-固定配料 { background:#f0f8e8; color:#3a6020; border:1px solid #a8d080; }
.dish-pending { background:#f5f5f5; color:#aaa; border:1px dashed #ccc; }
.pstar { color:#c9710f; font-size:0.65rem; margin-left:2px; }

select.isel {
  border:1px solid #d8d8d8; border-radius:3px; padding:3px 6px;
  font-size:0.78rem; background:#fff; color:#1a1a1a; font-family:inherit; cursor:pointer;
}
select.isel:focus { outline:none; border-color:#c9710f; }
.cinput {
  border:1px solid #d8d8d8; border-radius:3px; padding:3px 5px;
  font-size:0.78rem; background:#fff; color:#1a1a1a; font-family:inherit;
}
.cinput:focus { outline:none; border-color:#c9710f; }
.conv-pending { font-size:0.76rem; color:#bbb; cursor:pointer; }
.conv-pending:hover { color:#c9710f; }
.del-btn {
  background:none; border:none; cursor:pointer; color:#d8d8d8;
  font-size:0.83rem; padding:2px 5px; border-radius:3px; transition:all 0.1s;
}
.del-btn:hover { background:#fff0f0; color:#cc3333; }

.add-row { background:#fdfdf8; }

function showToast(msg) {

  if(p==='db') renderDB();
}

    {name:"家傳兜錢菜",ingredients:[],note:""},
    {name:"御白飯",ingredients:["白米"],note:""},

};

let qtyMemory = {};

// 菜單規劃：導覽

let currentMenu = null;

function buildNav() {
  const groups = {};
  Object.keys(menuData).forEach(key => {
    const parts = key.split(' ');
    const yr = parts[parts.length-1].replace(/-\d+$/,'');
    const fest = parts.slice(0,-1).join(' ');
    if (!groups[yr]) groups[yr]=[];
    groups[yr].push({key, fest});
  });
  const nav = document.getElementById('navList');
  nav.innerHTML = '';
  Object.keys(groups).sort((a,b)=>b-a).forEach(yr => {
    const div = document.createElement('div');
    div.className = 'yr-group';
    div.innerHTML = `<div class="yr-label">${yr}</div>`;
    groups[yr].forEach(({key, fest}) => {
      const btn = document.createElement('button');
      btn.className = 'nav-btn';
      btn.id = 'nb-'+key;
      btn.innerHTML = `${fest}<span class="d-small">${menuData[key].date}</span>`;
      btn.onclick = () => showMenu(key);
      div.appendChild(btn);
    });
    nav.appendChild(div);
  });
}

function showMenu(key) {
  currentMenu = key;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const nb = document.getElementById('nb-'+key);
  if (nb) { nb.classList.add('active'); nb.scrollIntoView({block:'nearest'}); }
  if (!qtyMemory[key]) qtyMemory[key] = {};
  renderMenuContent();
  document.getElementById('printBtn').style.display = '';
  document.getElementById('shopBtn').style.display = '';
}

function renderMenuContent() {
  if (!currentMenu) return;
  const menu = menuData[currentMenu];
  const p = getPersons();
  const parts = currentMenu.split(' ');
  const yr = parts[parts.length-1].replace(/-\d+$/,'');
  const fest = parts.slice(0,-1).join(' ');

  let dishesHTML = menu.dishes.map((dish,i) => renderDishRow(currentMenu,i,dish,p)).join('');

  let dizhuHTML = '';
  if (menu.dizhu) {
    dizhuHTML = `<div class="dizhu-box">
      <div class="dizhu-hdr">供桌　地基主</div>
      <div class="dizhu-body">
        ${menu.dizhu.map((item,i)=>`<div class="dizhu-item"><span class="dizhu-n">${i+1}</span><span>${item}</span></div>`).join('')}
      </div>
    </div>`;
  }

  document.getElementById('menuMain').innerHTML = `
    <div class="menu-hdr">
      <div class="menu-hdr-title">${currentMenu}</div>
      <div class="menu-hdr-meta">${menu.date}</div>
      <div class="menu-hdr-actions">
        <button class="btn-nav" style="color:#6f6539;border-color:#c9a84c" onclick="openPrint()">列印菜單 ▤</button>
        <button class="btn-nav" style="color:#6f6539;border-color:#c9a84c" onclick="toggleShopping()">採購清單 ▸</button>
      </div>
    </div>
    <div class="sec-label">桌菜　MAIN TABLE</div>
    <div id="dishList">${dishesHTML}</div>
    <button class="add-dish-btn" onclick="toggleNewDishForm()">＋ 新增菜色</button>
    <div class="new-dish-form" id="newDishForm">
      <div class="nd-row"><label>菜名</label><input id="nd-name" placeholder="例：清蒸石斑"></div>
      <div class="nd-row"><label>食材（逗號隔開）</label><input id="nd-ingr" placeholder="例：石斑,薑,蔥"></div>
      <div class="nd-row"><label>備註</label><input id="nd-note" placeholder="素 / 冷盤…"></div>
      <div class="nd-actions">
        <button class="btn-add-dish" onclick="commitNewDish()">加入菜單</button>
        <button class="btn-cancel-dish" onclick="toggleNewDishForm()">取消</button>
      </div>

function renderDishRow(key, idx, dish, persons) {
  const noteHTML = dish.note ? `<span class="note-badge">${dish.note}</span> ` : '';
  const ingrHTML = dish.ingredients.length
    ? dish.ingredients.map(ing => {
        const dbRec = lookupIngredient(ing);
        const linked = dbRec ? ' linked' : '';
        return `<span class="ing-tag${linked}" onclick="toggleQty('${key}',${idx},'${ing}')">${ing}</span>`;
      }).join('')
    : '<span style="font-size:0.72rem;color:#ccc">尚未填寫食材</span>';

  // qty panel
  const qd = (qtyMemory[key]||{})[idx]||{};
  const qtyRowsHTML = dish.ingredients.map(ing => {
    const dbRec = lookupIngredient(ing);
    const saved = qd[ing];
    const dt = dbRec?.dishType||'';
    const cu = dbRec?.convUnit||'';
    const pu = dbRec?.unit||'';

    let inputHTML = '', resultHTML = '', typeBadge = '';
    if (dt) typeBadge = `<span class="qty-type-badge qt-${dt}">${dt}</span>`;

    if (dt === '整份') {
      const perDish = saved?.qty ?? dbRec.convQty ?? '';
      const need = perDish ? Math.ceil(persons/perDish) : '—';
      const needStr = perDish ? `需 <b>${need}</b>${pu}` : '—';
      inputHTML = `<input class="qty-input" type="number" min="1" step="1"
        value="${perDish}" placeholder="幾人/份"
        onchange="saveQty('${key}',${idx},'${ing}',this.value,'${pu}')">
        <span class="qty-unit-lbl">人/1${pu}</span>`;
      resultHTML = `<span class="qty-result" id="qr-${key}-${idx}-${encodeIng(ing)}">${needStr}</span>`;
    } else if (dt === '固定配料') {
      const fixQty = saved?.qty ?? dbRec.convQty ?? '';
      inputHTML = `<input class="qty-input" type="number" min="0" step="1"
        value="${fixQty}" placeholder="固定量"
        onchange="saveQty('${key}',${idx},'${ing}',this.value,'${cu}')">
        <span class="qty-unit-lbl">${cu}</span>`;
      resultHTML = `<span class="qty-result" id="qr-${key}-${idx}-${encodeIng(ing)}">固定</span>`;
    } else {
      // 個人份 or 未連結
      const perPerson = saved?.qty ?? (dbRec?.convQty ?? '');
      const unit = saved?.unit || cu || 'g';
      const total = perPerson ? perPerson*persons : '—';
      const totalStr = perPerson ? `需 <b>${total}</b>${unit}` : '—';
      inputHTML = `<input class="qty-input" type="number" min="0" step="5"
        value="${perPerson}" placeholder="每人"
        onchange="saveQty('${key}',${idx},'${ing}',this.value,'${unit}')">
        <span class="qty-unit-lbl">${unit}/人</span>`;
      resultHTML = `<span class="qty-result" id="qr-${key}-${idx}-${encodeIng(ing)}">${totalStr}</span>`;
    }

    return `<div class="qty-row-item">
      <label>${ing}${typeBadge}</label>
      ${inputHTML}${resultHTML}
    </div>`;
  }).join('');

  const hasIngr = dish.ingredients.length > 0;
  return `<div class="dish-row" id="dr-${key}-${idx}">
    <span class="dish-num">${idx+1}</span>
    <div class="dish-body">
      <div class="dish-name">${noteHTML}${dish.name}</div>
      <div class="dish-tags">${ingrHTML}</div>
      ${hasIngr ? `<div class="qty-panel" id="qp-${key}-${idx}">
        <div class="qty-panel-hdr">食材份量　×${persons} 人　（藍色標籤已連結食材資料庫）</div>
        ${qtyRowsHTML}
      </div>` : ''}
    </div>
  </div>`;
}

function encodeIng(s) { return s.replace(/[^\w\u4e00-\u9fa5]/g,'_'); }

function toggleQty(key, idx, ing) {
  const panel = document.getElementById(`qp-${key}-${idx}`);
  if (panel) panel.classList.toggle('open');
}

function saveQty(key, idx, ing, val, unit) {
  if (!qtyMemory[key]) qtyMemory[key]={};
  if (!qtyMemory[key][idx]) qtyMemory[key][idx]={};
  qtyMemory[key][idx][ing] = {qty: parseFloat(val)||0, unit};
  updateShoppingPanel();
}

}
document.addEventListener('change', e => {

function addNewSession() {
  const fv = document.getElementById('ns-festival').value;
  const cn = document.getElementById('ns-custom-name').value.trim();
  const fest = fv==='__custom__'?cn:fv;
  const yr = document.getElementById('ns-year').value.trim();
  const dt = document.getElementById('ns-date').value.trim();
  const err = document.getElementById('ns-err');
  if (!fest) { err.textContent='請填寫節日名稱'; err.style.display='block'; return; }
  if (!yr||!/^\d{4}$/.test(yr)) { err.textContent='請填寫正確年份'; err.style.display='block'; return; }
  let key = `${fest} ${yr}`;
  if (menuData[key]) { let s=2; while(menuData[`${key}-${s}`]) s++; key=`${key}-${s}`; }
  menuData[key] = {date:dt||yr, dishes:[], dizhu:null};
  buildNav();
  toggleNewSessionForm();
  showMenu(key);
  ['ns-year','ns-date','ns-custom-name'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('ns-festival').value='除夕';
  document.getElementById('ns-custom-row').style.display='none';
}

function toggleShopping() {
  document.getElementById('shoppingPanel').classList.toggle('open');
}

function updateShoppingPanel() {
  if (!currentMenu) return;
  const persons = getPersons();
  const qd = qtyMemory[currentMenu]||{};
  const totals = {};
  const groups = {整份:{},個人份:{},固定配料:{},未連結:{}};

  menuData[currentMenu].dishes.forEach((dish,i) => {
    const dq = qd[i]||{};
    dish.ingredients.forEach(ing => {
      const mem = dq[ing];
      if (!mem||!mem.qty) return;
      const dbRec = lookupIngredient(ing);
      const dt = dbRec?.dishType||'未連結';
      const unit = mem.unit||'';
      let display = '';
      if (dt==='整份') {
        const need = Math.ceil(persons/mem.qty);
        display = `${need} ${dbRec.unit}`;
      } else if (dt==='固定配料') {
        display = `${mem.qty} ${unit}`;
      } else {
        display = `${mem.qty*persons} ${unit}`;
      }
      const grp = groups[dt]||groups['未連結'];
      grp[ing] = display;
    });
  });

  let html = '';
  const order = ['整份','個人份','固定配料','未連結'];
  const labels = {整份:'整份料理',個人份:'個人份食材',固定配料:'固定配料',未連結:'未連結食材'};
  order.forEach(grp => {
    const items = groups[grp];
    if (!Object.keys(items).length) return;
    html += `<div class="sp-group-label">${labels[grp]}</div>`;
    Object.entries(items).forEach(([name,qty]) => {
      html += `<div class="sp-item"><span class="sp-name">${name}</span><span class="sp-qty">${qty}</span></div>`;
    });
  });
  document.getElementById('spContent').innerHTML = html||'<div class="sp-empty">點擊食材標籤來輸入份量</div>';
}

let dbSortCol='name', dbSortDir=1, dbAddRowVisible=false;
const CAT_LIST   = ["蔬菜","禽畜","海鮮","豆蛋","辛香料","醬料","現成品","穀糧","乳製品","乾貨","湯底"];
const DISH_TYPES = ["整份","個人份","固定配料"];
const UNIT_LIST  = ["公克","毫升","尾","隻","條","把","顆","個","片","包","罐","斤","支","副","塊","碗","份","盒","桶"];

function dbConvText(r, persons) {
  if (!r.dishType||r.convQty===null) return '';
  const p=persons||8;
  if (r.dishType==='整份')    return r.convQty+'人/1'+r.unit+' → 需 <b>'+Math.ceil(p/r.convQty)+'</b>'+r.unit;
  if (r.dishType==='個人份')  return r.convQty+r.convUnit+'/人 → 需 <b>'+(r.convQty*p)+'</b>'+r.convUnit;
  if (r.dishType==='固定配料') return '固定 <b>'+r.convQty+'</b>'+r.convUnit;
  return '';
}

function renderDB() {
  const q   = document.getElementById('dbSearch').value.trim().toLowerCase();
  const cf  = document.getElementById('dbCatFilter').value;
  const df  = document.getElementById('dbDishFilter').value;
  let rows  = db.filter(r => {
    if (q && !r.name.toLowerCase().includes(q) && !(r.aliases||[]).some(a=>a.toLowerCase().includes(q))) return false;
    if (cf==='未分類') { if (r.cat!=='') return false; }
    else if (cf && r.cat!==cf) return false;
    const dtl = r.dishType==='整份'?'整份料理': r.dishType==='個人份'?'個人份': r.dishType==='固定配料'?'固定配料':'';
    if (df==='未設定') { if (r.dishType!=='') return false; }
    else if (df && dtl!==df) return false;
    return true;
  });
  rows.sort((a,b)=>{ const av=a[dbSortCol]||'zzz', bv=b[dbSortCol]||'zzz'; return av.localeCompare(bv,'zh-TW')*dbSortDir; });
  document.getElementById('dbCount').textContent='共 '+rows.length+' 筆';
  [['name','name'],['cat','cat'],['dish','dishType'],['unit','unit']].forEach(([k,col])=>{
    const el=document.getElementById('arr-'+k);
    if (el) el.textContent=dbSortCol===col?(dbSortDir===1?'↑':'↓'):'↕';
  });
  const p = getPersons();
  let html='';
  if (!rows.length) { html='<tr class="empty-row"><td colspan="8">查無符合的食材</td></tr>'; }
  else rows.forEach((r,i)=>{
    const pending=!r.cat||!r.dishType||!r.unit;
    const catBadge=r.cat
      ?`<span class="cat-badge cat-${r.cat}" onclick="dbEditField(${r.id},'cat')">${r.cat}</span>`
      :`<span class="cat-badge cat-未分類" onclick="dbEditField(${r.id},'cat')">未分類<span class="pstar">★</span></span>`;
    const dtLabel=r.dishType==='整份'?'整份料理':r.dishType==='個人份'?'個人份':r.dishType==='固定配料'?'固定配料':'';
    const dtBadge=dtLabel
      ?`<span class="dish-badge dish-${r.dishType}" onclick="dbEditField(${r.id},'dishType')">${dtLabel}</span>`
      :`<span class="dish-badge dish-pending" onclick="dbEditField(${r.id},'dishType')">未設定<span class="pstar">★</span></span>`;
    const unitCell=r.unit
      ?`<span style="cursor:pointer" onclick="dbEditField(${r.id},'unit')">${r.unit}</span>`
      :`<span style="cursor:pointer;color:#aaa" onclick="dbEditField(${r.id},'unit')">未設定<span class="pstar">★</span></span>`;
    const cv=(r.dishType&&r.convQty!==null)
      ?dbConvText(r,p)
      :`<span class="conv-pending" onclick="dbEditConv(${r.id})">點擊設定<span class="pstar">★</span></span>`;
    const aliasNote=[
      (r.aliases&&r.aliases.length)?`<span style="color:#aaa">${r.aliases.join('、')}</span>`:'',
      r.note?`<span style="font-style:italic">${r.note}</span>`:''
    ].filter(Boolean).join(' ');
    html+=`<tr id="dbrow-${r.id}" class="${pending?'prow':''}">
      <td class="cn">${i+1}</td>
      <td class="cname">${r.name}</td>
      <td class="ccat">${catBadge}</td>
      <td class="cdish">${dtBadge}</td>
      <td class="cunit">${unitCell}</td>
      <td class="cconv" id="dbconv-${r.id}">${cv}</td>
      <td class="cnote">${aliasNote}</td>
      <td><button class="del-btn" onclick="dbDeleteRow(${r.id})">✕</button></td>
    </tr>`;
  });
  if (dbAddRowVisible) {
    const co=CAT_LIST.map(c=>`<option>${c}</option>`).join('');
    const do_=DISH_TYPES.map(d=>`<option>${d}</option>`).join('');
    const uo=UNIT_LIST.map(u=>`<option>${u}</option>`).join('');
    html+=`<tr class="add-row">
      <td class="cn">＋</td>
      <td><input class="add-inp" id="db-add-name" placeholder="食材名稱" onkeydown="if(event.key==='Enter')dbCommitAdd()"></td>
      <td><select class="isel add-inp" id="db-add-cat"><option value="">未分類</option>${co}</select></td>
      <td><select class="isel add-inp" id="db-add-dt"><option value="">未設定</option>${do_}</select></td>
      <td><select class="isel add-inp" id="db-add-unit"><option value="">未設定</option>${uo}</select></td>
      <td></td><td></td>
      <td><span style="display:flex;gap:4px">
        <button class="icon-btn" onclick="dbCommitAdd()">✓</button>
        <button class="icon-btn" onclick="dbCancelAdd()">✕</button>
      </span></td>
    </tr>`;
  }
  document.getElementById('dbTableBody').innerHTML=html;
  if (dbAddRowVisible) document.getElementById('db-add-name')?.focus();
}

function dbSortBy(col) { if(dbSortCol===col)dbSortDir*=-1; else{dbSortCol=col;dbSortDir=1;} renderDB(); }

function dbEditField(id,field) {
  const r=db.find(x=>x.id===id); if(!r) return;
  const colClass=field==='dishType'?'cdish':'c'+field;
  const cell=document.querySelector(`#dbrow-${id} .${colClass}`); if(!cell) return;
  let opts='';
  if(field==='cat') opts=[...CAT_LIST,'未分類'].map(c=>`<option${r.cat===c?' selected':''}>${c}</option>`).join('');
  else if(field==='dishType') opts=`<option value="">未設定</option>`+DISH_TYPES.map(d=>`<option${r.dishType===d?' selected':''}>${d}</option>`).join('');
  else if(field==='unit') opts=`<option value="">未設定</option>`+UNIT_LIST.map(u=>`<option${r.unit===u?' selected':''}>${u}</option>`).join('');
  cell.innerHTML=`<select class="isel" onchange="dbSaveField(${id},'${field}',this.value)" onblur="renderDB()">${opts}</select>`;
  cell.querySelector('select').focus();
}
function dbSaveField(id,field,val) {
  const r=db.find(x=>x.id===id); if(!r) return;
  if(field==='cat') r.cat=val==='未分類'?'':val;
  else r[field]=val;
  renderDB(); showToast('已更新');
}
function dbEditConv(id) {
  const r=db.find(x=>x.id===id); if(!r) return;
  const cell=document.getElementById('dbconv-'+id); if(!cell) return;
  const hint=!r.dishType?'請先設定菜餚類型':{整份:'幾人一份',個人份:'每人用量',固定配料:'固定總量'}[r.dishType]||'';
  cell.innerHTML=`<span style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
    <input class="cinput" id="dbcq-${id}" type="number" min="0" step="0.5" value="${r.convQty??''}" placeholder="數量" style="width:52px">
    <input class="cinput" id="dbcu-${id}" value="${r.convUnit}" placeholder="單位" style="width:44px">
    <button class="icon-btn" onclick="dbSaveConv(${id})">✓</button>
    <span style="font-size:0.68rem;color:#aaa">${hint}</span>
  </span>`;
  document.getElementById('dbcq-'+id)?.focus();
}
function dbSaveConv(id) {
  const r=db.find(x=>x.id===id); if(!r) return;
  const qv=document.getElementById('dbcq-'+id)?.value;
  const uv=document.getElementById('dbcu-'+id)?.value||'';
  r.convQty=qv!==''?parseFloat(qv):null; r.convUnit=uv;
  renderDB(); showToast('換算已更新');
}
function showDBAddRow(){dbAddRowVisible=true;renderDB();}
function dbCancelAdd(){dbAddRowVisible=false;renderDB();}
function dbCommitAdd(){
  const name=(document.getElementById('db-add-name')?.value||'').trim();
  if(!name){showToast('請輸入食材名稱');return;}
  const cat=document.getElementById('db-add-cat')?.value||'';
  const dt=document.getElementById('db-add-dt')?.value||'';
  const unit=document.getElementById('db-add-unit')?.value||'';
  db.push({id:dbNextId++,name,cat,dishType:dt,unit,convQty:null,convUnit:'',aliases:[],note:''});
  dbAddRowVisible=false; renderDB(); showToast('已新增：'+name);
}
function dbDeleteRow(id){
  const r=db.find(x=>x.id===id);
  if(!r||!confirm(`確定刪除「${r.name}」？`)) return;
  db=db.filter(x=>x.id!==id); renderDB(); showToast('已刪除：'+r.name);
}

// Export
function openExportModal()  { document.getElementById('exportModal').classList.add('open'); }
function closeExportModal() { document.getElementById('exportModal').classList.remove('open'); }
function exportCSV(){
  const hdr='名稱,類別,菜餚類型,採購單位,換算數量,換算單位,別名,備註\n';
  const rows=db.map(r=>`"${r.name}","${r.cat||'未分類'}","${r.dishType||'未設定'}","${r.unit||'未設定'}","${r.convQty??''}","${r.convUnit}","${(r.aliases||[]).join('/')}","${r.note||''}"`).join('\n');
  dlFile('食材資料庫.csv','\uFEFF'+hdr+rows,'text/csv');
  closeExportModal(); showToast('CSV 已下載');
}
function exportJSON(){
  dlFile('食材資料庫.json',JSON.stringify(db,null,2),'application/json');
  closeExportModal(); showToast('JSON 已下載');
}
function dlFile(fn,c,t){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([c],{type:t}));
  a.download=fn; a.click();
}
document.getElementById('exportModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeExportModal();});

// ════════════════════════════════════════════════
// Init
// ════════════════════════════════════════════════
buildNav();
document.getElementById('exportBtn').style.display='none';
</script>
